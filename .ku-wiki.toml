# ku-wiki configuration
# Generated by ku-wiki init
# Documentation: https://github.com/VLSiddarth/ku-obsidian-wiki

# ── Required ──────────────────────────────────────────────────────────────────
ku_api_key = "ku_test_cfbc56bd98b115d51a099b30c33779af766717e7fef70601"
vault_path = "~/ObsidianVault"

# ── Optional: LLM compilation (produces better prose) ─────────────────────────
# Without this, ku-wiki runs in template mode (structured stubs, no synthesis)
anthropic_api_key = ""

# ── Discovery settings ────────────────────────────────────────────────────────
default_difficulty = 3          # 1=beginner, 5=expert/research
default_formats = [
    "pdf",
    "github",
    "html",
    "video",
    "jupyter",
    "stackoverflow",
]
max_results = 10

# ── Update settings ───────────────────────────────────────────────────────────
update_interval = "weekly"      # "daily" | "weekly"
since_days = 7                  # look back N days for new sources

# ── Notifications (optional) ──────────────────────────────────────────────────
# webhook_url = "https://hooks.slack.com/services/..."

# ── Knowledge Universe API base URL ───────────────────────────────────────────
# Change this if running KU locally (VPC deployment)
ku_base_url = "https://vlsiddarth-knowledge-universe.hf.space"
